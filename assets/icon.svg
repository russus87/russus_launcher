<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C5CFF"/>
      <stop offset="0.55" stop-color="#5B6CFF"/>
      <stop offset="1" stop-color="#21D4FD"/>
    </linearGradient>
    <linearGradient id="body" x1="512" y1="190" x2="512" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E6ECFF"/>
    </linearGradient>
    <linearGradient id="flame" x1="512" y1="690" x2="512" y2="880" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD15C"/>
      <stop offset="0.6" stop-color="#FF8A3D"/>
      <stop offset="1" stop-color="#FF4D6D"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#1B0A52" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <circle cx="232" cy="232" r="120" fill="#FFFFFF" opacity="0.10"/>
  <circle cx="840" cy="356" r="70" fill="#FFFFFF" opacity="0.08"/>

  <g filter="url(#soft)">
    <!-- flame -->
    <path d="M512 656c54 44 80 96 80 150 0 52-36 86-80 86s-80-34-80-86c0-54 26-106 80-150z" fill="url(#flame)"/>
    <!-- rocket body -->
    <path d="M512 168c104 70 168 196 168 336 0 70-18 132-46 182H390c-28-50-46-112-46-182 0-140 64-266 168-336z" fill="url(#body)"/>
    <!-- window -->
    <circle cx="512" cy="392" r="74" fill="#5B6CFF"/>
    <circle cx="512" cy="392" r="74" fill="none" stroke="#3A2F8F" stroke-opacity="0.25" stroke-width="10"/>
    <circle cx="486" cy="366" r="22" fill="#A9D8FF" opacity="0.9"/>
    <!-- left fin -->
    <path d="M344 540c-58 14-104 58-118 124 56 6 104-8 140-44z" fill="#21D4FD"/>
    <!-- right fin -->
    <path d="M680 540c58 14 104 58 118 124-56 6-104-8-140-44z" fill="#21D4FD"/>
  </g>
</svg>
